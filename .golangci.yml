linters-settings:
  errcheck:
    exclude-functions:
      - (*github.com/hashicorp/terraform-plugin-sdk/v2/helper/schema.ResourceData).Set
      - crypto/rand.Read

linters:
  enable:
    - errcheck
    - staticcheck
    - unused

issues:
  exclude-rules:
    - linters:
        - errcheck
      text: "DeleteKPI"
    - linters:
        - staticcheck
      text: "SA1019.*plugin.Debug"
    - linters:
        - staticcheck
      text: "SA9003"
